version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - ci
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"
