name: cross-platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "20 6 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cross-platform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: cross-platform smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
    fail-fast: false
    matrix:
      os: [ubuntu-latest, windows-latest, macos-latest]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Cross-platform metadata smoke
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import json

          required = [
            "README.md",
            "LICENSE",
            "NOTICE",
            "VERSION",
          ]
          missing = [path for path in required if not Path(path).exists()]
          if missing:
            raise SystemExit(f"missing required path(s): {', '.join(missing)}")

          manifest = {
            "os": "${{ runner.os }}",
            "version_file": (Path("VERSION").read_text(encoding="utf-8").strip()),
          }
          print(json.dumps(manifest, sort_keys=True))
          print("cross-platform metadata smoke passed")
          PY
