name: OSV scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 6 * * 3"
  workflow_dispatch:

permissions: {}

concurrency:
  group: osv-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  osv-scan:
    name: OSV vulnerability scan
    permissions:
      contents: read
    uses: NDDev-it-com/ci-workflows/.github/workflows/osv-scan.yml@2ccb80e96f5771b6a6b4eae63a4f47e232906dc7 # 0.12.0
    with:
      scan_args: '--recursive .'
