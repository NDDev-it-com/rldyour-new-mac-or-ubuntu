name: dependency-check

on:
  schedule:
    - cron: "40 6 * * 1"
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-pins:
    name: Dependency pin checks
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate one-owner-per-harness delegation
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from pathlib import Path

          installers = [
              Path("scripts/macos/install.sh"),
              Path("scripts/ubuntu/install.sh"),
          ]
          common = Path("scripts/lib/common.sh")

          # The active harness set is codex and zcode; each is installed by its
          # authoritative NDDev module, never inline and never through a
          # bun/npm global path or a frozen AI-CLI bundle.
          removed_globals = [
              "@anthropic-ai/claude-code",
              "opencode-ai",
              "@mimo-ai/cli",
              "install_ai_cli_bundle",
              "install_antigravity_artifact",
          ]
          for path in installers + [common]:
              data = path.read_text(encoding="utf-8")
              for marker in removed_globals:
                  if marker in data:
                      raise SystemExit(f"removed harness install path present in {path}: {marker}")

          if Path("templates/ai-cli").exists():
              raise SystemExit("the frozen AI-CLI bundle template must be removed")

          for path in installers:
              data = path.read_text(encoding="utf-8")
              if "install_ai_runtimes" not in data:
                  raise SystemExit(f"harness entrypoint missing in {path}")
          common_data = common.read_text(encoding="utf-8")
          for func in (
              "rldyour::install_selected_harnesses",
              "rldyour::install_codex_harness",
              "rldyour::install_zcode_harness",
              "RLDYOUR_CODEX_MODULE",
              "RLDYOUR_ZCODE_MODULE",
          ):
              if func not in common_data:
                  raise SystemExit(f"harness delegation symbol missing in {common}: {func}")

          # A streamed Antigravity installer was always forbidden and stays gone.
          streamed_installer = "antigravity.google/cli/install.sh"
          for path in installers:
              if streamed_installer in path.read_text(encoding="utf-8"):
                  raise SystemExit(f"streamed installer is forbidden in {path}")

          print("harness delegation is one-owner-per-harness: codex + zcode via GDS modules")
          PY

      - name: Validate dependency-check intent
        shell: bash
        run: |
          set -euo pipefail
          required=(
            "scripts/bootstrap.sh"
            "scripts/ci/validate.sh"
            "scripts/macos/install.sh"
            "scripts/ubuntu/install.sh"
          )

          for script in "${required[@]}"; do
            if [ ! -r "$script" ]; then
              echo "Missing required script: $script" >&2
              exit 1
            fi
          done
          echo "dependency intent verified"
