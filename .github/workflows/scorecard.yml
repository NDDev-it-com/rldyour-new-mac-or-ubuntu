name: scorecard

on:
  schedule:
    - cron: "0 3 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: scorecard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analysis:
    name: OSSF Scorecard
    permissions:
      id-token: write
      contents: read
      actions: read
    uses: NDDev-it-com/nddev-ci-workflows/.github/workflows/public-scorecard-json.yml@21bd3f7c3bbcbd7a9ecd3475b293d9e65aa8563a # 0.2.2
