name: scorecard

on:
  schedule:
    - cron: "0 3 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: scorecard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analysis:
    name: OSSF Scorecard
    permissions:
      id-token: write
      contents: read
      actions: read
    uses: NDDev-it-com/ci-workflows/.github/workflows/public-scorecard-json.yml@2ccb80e96f5771b6a6b4eae63a4f47e232906dc7 # 0.12.0
    with:
      publish_results: false
