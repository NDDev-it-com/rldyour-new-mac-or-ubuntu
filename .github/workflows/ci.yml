name: bootstrap-ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      mode:
        description: "Hosted CI validates plan mode only; apply belongs on a disposable target VM."
        required: true
        default: plan
        type: choice
        options:
          - plan
      platform:
        description: "Run target platform(s) on matrix."
        required: true
        default: both
        type: choice
        options:
          - both
          - macos
          - ubuntu

permissions:
  contents: read

concurrency:
  group: bootstrap-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bootstrap-script-lint:
    runs-on: ${{ matrix.os }}
    name: bootstrap-script-lint-${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1

      - name: Prepare validation tools
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            brew update
            brew install shellcheck ripgrep
          else
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends shellcheck ripgrep
          fi

      - name: Lint bootstrap scripts
        run: |
          bash scripts/ci/lint.sh

  bootstrap-validate:
    needs: bootstrap-script-lint
    runs-on: ${{ matrix.os }}
    name: bootstrap-${{ matrix.platform }}-${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'plan' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: ubuntu
          - os: macos-latest
            platform: macos
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1

      - name: Prepare validation tools
        if: github.event_name != 'workflow_dispatch' || inputs.platform == 'both' || inputs.platform == matrix.platform
        run: |
          case "${{ matrix.os }}" in
            macos*) 
              brew update
              brew install shellcheck ripgrep
              ;;
            *)
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends shellcheck ripgrep
              ;;
          esac

      - name: Validate bootstrap scripts (syntax + shellcheck + contract + dry-runs)
        if: github.event_name != 'workflow_dispatch' || inputs.platform == 'both' || inputs.platform == matrix.platform
        run: |
          bash scripts/ci/validate.sh

      - name: Verify bootstrap entrypoint for target platform
        if: github.event_name != 'workflow_dispatch' || inputs.platform == 'both' || inputs.platform == matrix.platform
        run: |
          args=(--profile desktop)
          if [ "${{ matrix.platform }}" = "ubuntu" ]; then
            args+=(--no-gui)
          fi
          bash scripts/bootstrap.sh --platform "${{ matrix.platform }}" "${args[@]}" --plan --skip-checks

  bootstrap-dryrun-crosscheck:
    needs: bootstrap-validate
    if: github.event_name != 'workflow_dispatch' || inputs.mode == 'plan'
    runs-on: ${{ matrix.os }}
    name: bootstrap-crosscheck-${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: ubuntu
            cross_platform: macos
          - os: macos-latest
            platform: macos
            cross_platform: ubuntu
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1

      - name: Crosscheck other platform installer in plan mode
        if: github.event_name != 'workflow_dispatch' || inputs.platform == 'both' || inputs.platform == matrix.platform
        run: |
          args=(--profile desktop --no-gui)
          bash scripts/bootstrap.sh --platform "${{ matrix.cross_platform }}" "${args[@]}" --plan --skip-system --skip-checks

  workflow-lint:
    runs-on: ubuntu-latest
    name: workflow-lint
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1

      - name: Lint GitHub workflow YAML files
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7

  bootstrap-gate:
    needs: [bootstrap-script-lint, bootstrap-validate, bootstrap-dryrun-crosscheck, workflow-lint]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Bootstrap CI gate
        run: |
          echo "Checking required bootstrap workflow jobs"
          echo "mode=plan"

          if [[ "${{ needs.bootstrap-script-lint.result }}" != "success" ]]; then
            echo "bootstrap-script-lint: ${{ needs.bootstrap-script-lint.result }}" >&2
            exit 1
          fi

          if [[ "${{ needs.bootstrap-validate.result }}" != "success" ]]; then
            echo "bootstrap-validate: ${{ needs.bootstrap-validate.result }}" >&2
            exit 1
          fi

          if [[ "${{ needs.workflow-lint.result }}" != "success" ]]; then
            echo "workflow-lint: ${{ needs.workflow-lint.result }}" >&2
            exit 1
          fi

          if [[ "${{ needs.bootstrap-dryrun-crosscheck.result }}" != "success" ]]; then
            echo "bootstrap-dryrun-crosscheck: ${{ needs.bootstrap-dryrun-crosscheck.result }}" >&2
            exit 1
          fi

          echo "bootstrap-gate passed"
