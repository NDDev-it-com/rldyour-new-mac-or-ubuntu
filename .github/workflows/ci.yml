name: bootstrap-ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run bootstrap as plan (default) or apply."
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
      platform:
        description: "Run target platform(s) on matrix."
        required: true
        default: both
        type: choice
        options:
          - both
          - macos
          - ubuntu

permissions:
  contents: read

concurrency:
  group: bootstrap-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bootstrap-script-lint:
    runs-on: ${{ matrix.os }}
    name: bootstrap-script-lint-${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1

      - name: Prepare shellcheck
        run: |
          if [[ "${{ matrix.os }}" == macos* ]]; then
            brew update
            brew install shellcheck
          else
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi

      - name: Lint bootstrap scripts
        run: |
          bash scripts/ci/lint.sh

  bootstrap-validate:
    needs: bootstrap-script-lint
    if: github.event_name != 'workflow_dispatch' || inputs.platform == 'both' || inputs.platform == matrix.platform
    runs-on: ${{ matrix.os }}
    name: bootstrap-${{ matrix.platform }}-${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'plan' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: ubuntu
          - os: macos-latest
            platform: macos
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1

      - name: Prepare shellcheck
        run: |
          if [[ "${{ matrix.os }}" == macos* ]]; then
            brew update
            brew install shellcheck
          else
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi

      - name: Validate bootstrap scripts (syntax + shellcheck + contract + dry-runs)
        run: |
          bash scripts/ci/validate.sh

      - name: Verify bootstrap entrypoint for target platform
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.mode }}" == "apply" ]]; then
            bash scripts/bootstrap.sh --platform "${{ matrix.platform }}" --apply
          else
            bash scripts/bootstrap.sh --platform "${{ matrix.platform }}" --plan --skip-checks
          fi

  bootstrap-dryrun-crosscheck:
    needs: bootstrap-validate
    if: github.event_name != 'workflow_dispatch' || inputs.mode == 'plan'
    runs-on: ${{ matrix.os }}
    name: bootstrap-crosscheck-${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1

      - name: Crosscheck other platform installer in plan mode
        run: |
          if [[ "${{ matrix.os }}" == macos-latest ]]; then
            bash scripts/bootstrap.sh --platform ubuntu --plan --skip-system --skip-checks
          else
            bash scripts/bootstrap.sh --platform macos --plan --skip-system --skip-checks
          fi

  workflow-lint:
    runs-on: ubuntu-latest
    name: workflow-lint
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1

      - name: Lint GitHub workflow YAML files
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7
        with:
          args: -color .github/workflows/*.yml .github/workflows/*.yaml

  bootstrap-gate:
    needs: [bootstrap-script-lint, bootstrap-validate, bootstrap-dryrun-crosscheck, workflow-lint]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Bootstrap CI gate
        run: |
          mode="plan"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            mode="${{ inputs.mode }}"
          fi

          echo "Checking required bootstrap workflow jobs"
          echo "mode=${mode}"

          if [[ "${{ needs.bootstrap-script-lint.result }}" != "success" ]]; then
            echo "bootstrap-script-lint: ${{ needs.bootstrap-script-lint.result }}" >&2
            exit 1
          fi

          if [[ "${{ needs.bootstrap-validate.result }}" != "success" ]]; then
            echo "bootstrap-validate: ${{ needs.bootstrap-validate.result }}" >&2
            exit 1
          fi

          if [[ "${{ needs.workflow-lint.result }}" != "success" ]]; then
            echo "workflow-lint: ${{ needs.workflow-lint.result }}" >&2
            exit 1
          fi

          if [[ "$mode" == "plan" && "${{ needs.bootstrap-dryrun-crosscheck.result }}" != "success" ]]; then
            echo "bootstrap-dryrun-crosscheck: ${{ needs.bootstrap-dryrun-crosscheck.result }}" >&2
            exit 1
          fi

          echo "bootstrap-gate passed"
