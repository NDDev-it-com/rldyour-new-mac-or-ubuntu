name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 6 * * 3"
  workflow_dispatch:

permissions: {}

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Run gitleaks detect (history-aware)
        run: |
          set -euo pipefail
          image="zricethezav/gitleaks:v8.30.1"
          docker run --rm -v "${{ github.workspace }}:/repo" \
            "$image" detect \
              --source /repo \
              --redact \
              --no-banner \
              --exit-code 1
