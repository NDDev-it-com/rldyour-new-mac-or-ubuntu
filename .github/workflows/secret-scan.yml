name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 6 * * 3"
  workflow_dispatch:

permissions: {}

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks secret scan
    permissions:
      contents: read
    uses: NDDev-it-com/nddev-ci-workflows/.github/workflows/secret-scan.yml@1acba687361415b3f5942acceb40b228bb0387fd # 0.2.4
