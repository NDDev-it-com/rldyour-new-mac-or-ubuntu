name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version from VERSION (must match the file content)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release bundle
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Validate release version
        shell: bash
        env:
          RELEASE_INPUT_VERSION: ${{ inputs.version }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            version="$GITHUB_REF_NAME"
          else
            version="$RELEASE_INPUT_VERSION"
          fi

          if [ -z "$version" ]; then
            echo "release version is empty; tag push or workflow_dispatch input required" >&2
            exit 1
          fi
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "release version '$version' must be numeric SemVer X.Y.Z" >&2
            exit 1
          fi

          file_version="$(tr -d '[:space:]' < VERSION)"
          if [ "$version" != "$file_version" ]; then
            echo "release version '$version' does not match VERSION '$file_version'" >&2
            exit 1
          fi

          if ! grep -q "^## \\[$version\\]" CHANGELOG.md; then
            echo "CHANGELOG.md has no release entry for $version" >&2
            exit 1
          fi

          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Build release manifest and SBOM
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          set -euo pipefail
          mkdir -p dist
          tar --sort=name \
            --mtime="$(git log -1 --format=%cI)" \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            --exclude='.git' \
            --exclude='.pytest_cache' \
            --exclude='.serena' \
            --exclude='dist' \
            -cf - \
            CHANGELOG.md \
            README.md \
            SECURITY.md \
            CONTRIBUTING.md \
            LICENSE \
            NOTICE \
            VERSION \
            .github \
            config \
            scripts \
            docs \
            | gzip -n > "dist/rldyour-new-mac-or-ubuntu-${RELEASE_VERSION}.tar.gz"

          python3 - <<'PY'
          import os
          import json
          from datetime import datetime
          from pathlib import Path

          release_version = os.environ["RELEASE_VERSION"]
          artifact_name = f"rldyour-new-mac-or-ubuntu-{release_version}.tar.gz"
          manifest = {
              "package_name": "rldyour-new-mac-or-ubuntu",
              "version": Path("VERSION").read_text(encoding="utf-8").strip(),
              "generated_at": datetime.utcnow().isoformat() + "Z",
              "required_artifacts": [
                  artifact_name,
                  "sbom.spdx.json",
                  "release-manifest.json",
                  "SHA256SUMS",
              ],
          }
          if Path("dist/github-dependency-graph-sbom.spdx.json").exists():
              manifest["required_artifacts"].append("github-dependency-graph-sbom.spdx.json")

          Path("dist/release-manifest.json").write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")

          sbom = {
              "spdxVersion": "SPDX-2.3",
              "SPDXID": "SPDXRef-DOCUMENT",
              "name": "rldyour-new-mac-or-ubuntu",
              "packages": [
                  {
                      "SPDXID": "SPDXRef-Package-rldyour-new-mac-or-ubuntu",
                      "name": "rldyour-new-mac-or-ubuntu",
                      "versionInfo": manifest["version"],
                      "downloadLocation": "git+https://github.com/NDDev-it-com/rldyour-new-mac-or-ubuntu.git",
                  }
              ],
              "creationInfo": {
                  "created": datetime.utcnow().isoformat() + "Z",
                  "creators": ["Tool: rldyour-bootstrap-release-workflow"],
              },
          }
          Path("dist/sbom.spdx.json").write_text(json.dumps(sbom, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Export GitHub dependency graph SBOM when available
        run: |
          set -euo pipefail
          if gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "/repos/${GITHUB_REPOSITORY}/dependency-graph/sbom" \
            --jq '.sbom' \
            > dist/github-dependency-graph-sbom.spdx.json; then
            jq -e '.spdxVersion == "SPDX-2.3" and (.packages | length > 0)' \
              dist/github-dependency-graph-sbom.spdx.json >/dev/null
          else
            rm -f dist/github-dependency-graph-sbom.spdx.json
          fi

      - name: Generate release checksums
        run: |
          set -euo pipefail
          rm -f dist/SHA256SUMS
          sha256sum dist/* > dist/SHA256SUMS

      - name: Attest release bundle
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist/rldyour-new-mac-or-ubuntu-${{ env.RELEASE_VERSION }}.tar.gz

      - name: Attest generated SPDX SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist/sbom.spdx.json

      - name: Attest GitHub dependency graph SBOM
        if: hashFiles('dist/github-dependency-graph-sbom.spdx.json') != ''
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist/github-dependency-graph-sbom.spdx.json

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ env.RELEASE_VERSION }}
          path: dist
          retention-days: 30

      - name: Create release tag
        shell: bash
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/${RELEASE_VERSION}" >/dev/null; then
            echo "Tag ${RELEASE_VERSION} already exists"
          else
            git tag "${RELEASE_VERSION}"
            git push origin "refs/tags/${RELEASE_VERSION}"
          fi

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_VERSION" >/dev/null 2>&1; then
            gh release upload "$RELEASE_VERSION" dist/* --clobber
          else
            awk -v version="${RELEASE_VERSION}" '
              $0 ~ "^## \\[" version "\\]" { flag = 1; next }
              flag && /^## \[/ { exit }
              flag { print }
            ' CHANGELOG.md > dist/release-notes.md
            gh release create "$RELEASE_VERSION" \
              --verify-tag \
              --title "$RELEASE_VERSION" \
              --notes-file dist/release-notes.md \
              dist/*
          fi
