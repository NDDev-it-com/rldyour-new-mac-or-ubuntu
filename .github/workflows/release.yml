name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          [ "${GITHUB_REF_TYPE}" = "tag" ] || {
            echo "release workflow must run from a tag ref" >&2
            exit 1
          }
          file_version="$(tr -d '[:space:]' < VERSION)"
          [ "$version" = "$file_version" ] || {
            echo "release '$version' does not match VERSION '$file_version'" >&2
            exit 1
          }
          grep -q "^## \[$version\]" CHANGELOG.md || {
            echo "CHANGELOG.md has no release entry for $version" >&2
            exit 1
          }
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Require tag commit on main
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
            echo "release tag commit must be reachable from origin/main" >&2
            exit 1
          }

      - name: Prepare release validation tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck ripgrep
          python3 -m pip install --disable-pip-version-check pytest==9.1.1

      - name: Validate release source snapshot
        run: |
          set -euo pipefail
          bash scripts/ci/validate.sh
          python3 -m pytest -q

      - name: Validate workflow syntax
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7
        with:
          args: -color .github/workflows/*.yml

  supply-chain:
    needs: resolve
    permissions:
      contents: write
      id-token: write
      attestations: write
    uses: NDDev-it-com/nddev-ci-workflows/.github/workflows/release-supply-chain.yml@ac4d1f469f5974741c7449305ffcbd5f05a5a47f # 0.5.1
    with:
      version: ${{ needs.resolve.outputs.version }}
      package_name: rldyour-new-mac-or-ubuntu
      archive_paths: "README.md LICENSE NOTICE SECURITY.md VERSION CHANGELOG.md AGENTS.md .claude .github config scripts templates docs"
