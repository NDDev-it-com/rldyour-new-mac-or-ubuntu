name: pytest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bootstrap-pytests:
    permissions:
      contents: read
    uses: NDDev-it-com/nddev-ci-workflows/.github/workflows/python-ci.yml@ac4d1f469f5974741c7449305ffcbd5f05a5a47f # 0.5.1
    with:
      python_version: "3.14"
      install_command: >-
        sudo apt-get update &&
        sudo apt-get install -y --no-install-recommends zsh &&
        python -m pip install "pytest==9.1.1"
      test_command: python -m pytest -q
      timeout_minutes: 15
