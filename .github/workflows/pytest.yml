name: pytest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pytest-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bootstrap-pytests:
    permissions:
      contents: read
    uses: NDDev-it-com/ci-workflows/.github/workflows/python-ci.yml@2ccb80e96f5771b6a6b4eae63a4f47e232906dc7 # 0.12.0
    with:
      python_version: "3.14"
      install_command: >-
        sudo apt-get update &&
        sudo apt-get install -y --no-install-recommends zsh &&
        python -m pip install "pytest==9.1.1"
      test_command: python -m pytest -q
      timeout_minutes: 15
